<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCOMAX LUXURY | Elite Vehicle Sourcing</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #121212;
            --border-color: #262626;
            --text-main: #ffffff;
            --text-muted: #8a8a8a;
            --accent-gold: #d4af37;
            --accent-gold-hover: #f3e5ab;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 4px;
        }

        .form-section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.85rem;
            font-size: 1rem;
            border-radius: 2px;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            border-radius: 2px;
        }

        button:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            font-weight: 600;
        }

        #status-console {
            margin-top: 2rem;
            background-color: #000;
            border: 1px solid #1a1a1a;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            color: #4af626;
            display: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DCOMAX LUXURY</h1>
        <p>AI Operating Company | Vehicle Sourcing</p>
    </header>

    <div class="form-card">
        <form id="intakeForm">
            <div class="form-section-title">Client Identity</div>
            <div class="form-group">
                <label for="clientName">Full Name</label>
                <input type="text" id="clientName" required placeholder="e.g., Sterling Hunt">
            </div>
            <div class="form-group">
                <label for="clientEmail">Direct Email</label>
                <input type="email" id="clientEmail" required placeholder="name@domain.com">
            </div>

            <div class="form-section-title">Acquisition Profile</div>
            <div class="form-group">
                <label for="vehicleSpec">Desired Vehicle (Make, Model, Year, Trim)</label>
                <input type="text" id="vehicleSpec" required placeholder="e.g., 2025 Porsche 911 GT3 RS">
            </div>
            <div class="form-group">
                <label for="customNotes">Bespoke Specifications / Requirements</label>
                <textarea id="customNotes" placeholder="Specify preferred colorway, interior materials, mileage limits, or geographic constraints..."></textarea>
            </div>

            <button type="submit">Initiate AI Sourcing</button>
        </form>
    </div>

    <!-- Live Console showing the AI Agent Routing behavior -->
    <div id="status-console"></div>
</div>

<script>
    document.getElementById('intakeForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const consoleEl = document.getElementById('status-console');
        consoleEl.style.display = 'block';
        consoleEl.innerHTML = '';

        // Helper function to fake a realistic scrolling AI terminal log
        const logToConsole = (message) => {
            consoleEl.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}<br>`;
        };

        // 1. Gather payload from the DOM
        const payload = {
            name: document.getElementById('clientName').value,
            email: document.getElementById('clientEmail').value,
            vehicle: document.getElementById('vehicleSpec').value,
            notes: document.getElementById('customNotes').value
        };

        // 2. Simulate AI C-Suite execution routing logic
        logToConsole("⚡ Form submitted. Activating DCOMAX AI Matrix...");
        
        await new Promise(r => setTimeout(r, 800));
        logToConsole("🔍 <b>AI CMO</b>: Capturing lead data, logging conversion funnel data, and optimizing inquiry metrics.");
        
        await new Promise(r => setTimeout(r, 1000));
        logToConsole(`📈 <b>AI CRO</b>: Analyzing acquisition profile for: "${payload.vehicle}". Parsing priority metrics.`);
        
        await new Promise(r => setTimeout(r, 1000));
        logToConsole("💼 <b>AI CFO</b>: Initiating asset valuation & drafting baseline quotation brackets based on recent market clearing numbers.");
        
        await new Promise(r => setTimeout(r, 1200));
        logToConsole("🚢 <b>AI CPO</b>: Querying global supplier network arrays for available VIN matches matching criteria...");

        // 3. Hand off the data payload to your live backend endpoint
        logToConsole("🚀 Passing fully compiled client profile package to centralized orchestration server...");

        try {
            // Replace with your real agent API endpoint (e.g., v1/api/inbound-lead or Make/Zapier webhook)
            const response = await fetch('https://api.dcomaxluxury.com/v1/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                logToConsole("✅ <b>AI CEO</b>: Executive briefing updated successfully. Pinging Founder for final premium approval threshold.");
            } else {
                // Handled gracefully for local testing environments
                logToConsole("ℹ️ Payload structured perfectly. (Server returned mock confirmation. Ready for API endpoint attachment.)");
            }
        } catch (error) {
            logToConsole("ℹ️ Payload structured perfectly. (Ready to be wired to a live backend cloud function or webhook solution.)");
        }
    });
</script>
</body>
</html>
