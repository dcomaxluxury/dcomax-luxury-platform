<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCOMAX LUXURY | Private Concierge</title>
    <style>
        :root {
            --bg-color: #030303;
            --text-main: #ffffff;
            --text-muted: #bcbcbc;
            --accent-gold: #c5a880; /* Elegant champagne luxury gold */
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
            /* Using a high-end luxury dark vehicle gradient placeholder */
            background: linear-gradient(180deg, rgba(3,3,3,0.85) 40%, rgba(197,168,128,0.15) 100%), url('https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--text-muted);
            font-weight: 300;
        }

        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-icon span {
            display: block;
            width: 28px;
            height: 2px;
            background-color: var(--text-main);
        }

        /* Hero Section Container */
        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 1.5rem 8rem 1.5rem;
        }

        .tagline {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent-gold);
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.02em;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        h1 span.gold-italic {
            color: var(--accent-gold);
            font-style: italic;
            display: block;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 550px;
            font-weight: 300;
            letter-spacing: 0.01em;
            margin-bottom: 3.5rem;
        }

        /* Elite Action Button */
        .cta-btn {
            display: inline-block;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            text-decoration: none;
            padding: 1.2rem 2.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            border-radius: 2px;
            transition: all 0.4s ease;
            background-color: rgba(3,3,3,0.4);
            backdrop-filter: blur(5px);
        }

        .cta-btn:hover {
            background-color: var(--accent-gold);
            color: #000000;
            font-weight: 600;
            box-shadow: 0px 10px 30px rgba(197,168,128,0.2);
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
            }
            .hero-container {
                padding-top: 2rem;
            }
        }
    </style>
    <!-- Import Google Fonts for the luxury serif font styling -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">DCOMAX <span>LUXURY</span></div>
        <div class="menu-icon">
            <span></span>
            <span></span>
        </div>
    </nav>

    <main class="hero-container">
        <p class="tagline">Private Concierge &middot; Worldwide Delivery</p>
        
        <h1>The cars you want. <span class="gold-italic">Sourced discreetly.</span></h1>
        
        <p class="description">
            DCOMAX Luxury is a private acquisition house for executives, entrepreneurs, and enterprises. 
            We locate rare inventory, structure in-house financing, and deliver &mdash; anywhere.
        </p>

        <!-- Links directly over to the request page we just made! -->
        <a href="request.html" class="cta-btn">Initiate Acquisition</a>
    </main>

</body>
</html>
